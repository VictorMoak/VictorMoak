name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: VictorMoak

          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00087A&color_dots=#eef1fb,#a3b0e0,#4d5ec0,#0f2178,#00087A

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
